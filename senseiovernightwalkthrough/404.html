<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var currentPath = window.location.pathname;
      var oldPrefix = "/kumiko_site/senseiovernightwalkthrough/";
      
      // Check if the user is trying to access something in the old subfolder
      if (currentPath.indexOf(oldPrefix) === 0) {
        // Extract everything after the subfolder name
        var relativePath = currentPath.substring(oldPrefix.length);
        
        // Build the new destination URL, preserving queries (?abc) and hashes (#xyz)
        var newUrl = "https://kumiko7.github.io/senseiovernightwalkthrough/" 
                     + relativePath 
                     + window.location.search 
                     + window.location.hash;
        
        // Redirect immediately without keeping the 404 in history
        window.location.replace(newUrl);
      }
    })();
  </script>
</head>
<body>
  <p>Page has moved. Redirecting you to the new location...</p>
</body>
</html>
