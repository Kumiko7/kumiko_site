<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var currentPath = window.location.pathname;
      
      // List your old directories and their new base URLs
      var targets = [
        { 
          oldDir: "/kumiko_site/lessonsinlovewalkthrough", 
          newBase: "https://kumiko7.github.io/lessonsinlovewalkthrough/" 
        },
        { 
          oldDir: "/kumiko_site/senseiovernightwalkthrough", 
          newBase: "https://kumiko7.github.io/senseiovernightwalkthrough/" 
        }
      ];

      for (var i = 0; i < targets.length; i++) {
        var t = targets[i];
        
        // Match exact directory match OR any nested pages inside it
        if (currentPath === t.oldDir || currentPath.indexOf(t.oldDir + "/") === 0) {
          var remainder = currentPath.substring(t.oldDir.length);
          
          // Clean up leading slashes so the URL stitches together perfectly
          if (remainder.indexOf("/") === 0) {
            remainder = remainder.substring(1);
          }
          
          var newUrl = t.newBase + remainder + window.location.search + window.location.hash;
          window.location.replace(newUrl);
          return; 
        }
      }
    })();
  </script>
</head>
<body>
  <div style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>Page Not Found</h2>
    <p>If you aren't redirected in a few seconds, please head back to the <a href="https://kumiko7.github.io/kumiko_site/">main site</a>.</p>
  </div>
</body>
</html>
